name: link-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --accept 403 "**/*.md"
